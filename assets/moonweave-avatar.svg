<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">moonweave avatar</title>
  <desc id="desc">A crescent moon with two woven paths representing systems and research.</desc>
  <defs>
    <radialGradient id="bg" cx="35%" cy="26%" r="82%">
      <stop offset="0" stop-color="#1d2b53"/>
      <stop offset="0.54" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="weaveA" x1="227" y1="735" x2="814" y2="304" gradientUnits="userSpaceOnUse">
